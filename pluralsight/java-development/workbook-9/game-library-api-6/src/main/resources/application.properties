spring.application.name=game-library

# Database connection (set up in Week 10). Change username/password to your own.
spring.datasource.url=jdbc:mysql://localhost:3306/gamelibrary
spring.datasource.username=root
spring.datasource.password=root

# Print the SQL Hibernate generates (helpful while learning).
spring.jpa.show-sql=true

# Let Hibernate create/update tables from our entities (development setting).
spring.jpa.hibernate.ddl-auto=update

# JWT settings (Module 6). The secret must be at least 32 bytes for HS256.
# Use your own long, random value in a real project.
jwt.secret=9f8b2c7e4a1d6f30b85c2e91a47d6f08c3b1e25a9d4f78c206e1b3a5d8f0c2e74
jwt.expiration-ms=3600000
