spring.application.name=game-library

# Database connection (set up in Week 10). Change username/password to your own.
spring.datasource.url=jdbc:mysql://localhost:3306/gamelibrary
spring.datasource.username=root
spring.datasource.password=root

# Print the SQL Hibernate generates (helpful while learning).
spring.jpa.show-sql=true

# Let Hibernate create/update tables from our entities (development setting).
spring.jpa.hibernate.ddl-auto=update
